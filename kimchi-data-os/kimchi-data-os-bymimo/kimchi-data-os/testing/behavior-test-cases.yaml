# AI Behavior Test Cases
# Tests for reasoning quality, not code correctness

test_suite:
  name: "Kimchi Data OS Behavior Tests"
  version: "1.0.0"
  
  tests:
    # REASONING TESTS
    - id: "reason_001"
      name: "Root Cause Hypothesis Generation"
      category: reasoning
      input:
        request: "Why did sales drop 18% last quarter?"
        context: "B2B SaaS company, Q3 2024"
      expected:
        min_hypotheses: 3
        hypothesis_types: ["competitive", "market", "internal", "seasonal"]
        must_include:
          - "Competitor factors"
          - "Internal factors"
          - "External factors"
      scoring:
        method: "count_and_quality"
        pass_threshold: 0.8
    
    - id: "reason_002"
      name: "Statistical Test Selection"
      category: reasoning
      input:
        question: "Is there a significant difference between two groups?"
        data_description: "Continuous outcome, independent samples, n=50 per group, normal distribution"
      expected:
        test: "Independent t-test"
        must_check:
          - "Normality assumption"
          - "Independence assumption"
          - "Homogeneity of variance"
      scoring:
        method: "exact_match"
        pass_threshold: 1.0
    
    - id: "reason_003"
      name: "Alternative Explanation Seeking"
      category: reasoning
      input:
        finding: "Customers who use Feature X have 30% higher retention"
        request: "Validate this finding"
      expected:
        must_consider:
          - "Correlation vs causation"
          - "Selection bias"
          - "Confounding variables"
          - "Reverse causality"
        must_not:
          - "Assume causation from correlation"
      scoring:
        method: "checklist"
        pass_threshold: 0.9

    # OUTPUT FORMAT TESTS
    - id: "output_001"
      name: "Executive Summary Format"
      category: output
      input:
        analysis: "Complex multi-page analysis with 10 findings"
        audience: "CEO"
      expected:
        format:
          max_length: "1 page"
          must_contain:
            - "Bottom line up front"
            - "3-5 key findings"
            - "Recommendations with owners"
            - "Confidence levels"
          must_not_contain:
            - "Technical jargon"
            - "P-values"
            - "Algorithm names"
      scoring:
        method: "format_check"
        pass_threshold: 1.0
    
    - id: "output_002"
      name: "Forecast Report Format"
      category: output
      input:
        forecast: "3-month revenue forecast"
        metrics: {"mape": 0.12, "coverage": 0.92}
      expected:
        must_contain:
          - "Point forecast values"
          - "Prediction intervals"
          - "Confidence assessment"
          - "Scenario analysis"
          - "Key assumptions"
          - "Limitations"
      scoring:
        method: "checklist"
        pass_threshold: 0.95

    # CONFIDENCE TESTS
    - id: "confidence_001"
      name: "Confidence Score Calibration"
      category: confidence
      method: "simulation"
      procedure:
        - "Run 100 forecasts"
        - "For each, record stated confidence"
        - "Check if actual falls within interval"
        - "Calculate calibration error"
      expected:
        calibration_error_max: 0.05
        min_samples: 100
      scoring:
        method: "calibration"
        pass_threshold: 0.95
    
    - id: "confidence_002"
      name: "Confidence Justification"
      category: confidence
      input:
        claim: "Revenue will increase 15% next quarter"
      expected:
        must_provide:
          - "Evidence supporting claim"
          - "Factors that could invalidate"
          - "Confidence score (0-100)"
          - "Rationale for score"
      scoring:
        method: "checklist"
        pass_threshold: 0.9

    # CONSISTENCY TESTS
    - id: "consistency_001"
      name: "Forecast Consistency"
      category: consistency
      input:
        same_request: "Forecast Q4 sales"
        runs: 5
      expected:
        forecast_std_max: 0.15  # Max 15% std deviation
        same_workflow: true
        same_template: true
      scoring:
        method: "variance_check"
        pass_threshold: 0.9
    
    - id: "consistency_002"
      name: "Recommendation Consistency"
      category: consistency
      input:
        same_analysis: "Sales declined 18%"
        runs: 3
      expected:
        recommendation_overlap: 0.8  # 80% overlap in recommendations
      scoring:
        method: "overlap_check"
        pass_threshold: 0.85

    # EDGE CASE TESTS
    - id: "edge_001"
      name: "Missing Data Handling"
      category: edge_case
      input:
        data: "Time series with 40% missing values"
        request: "Forecast next month"
      expected:
        must_detect: "Missing data pattern"
        must_classify: "MCAR/MAR/MNAR"
        must_handle: "Appropriate imputation"
        must_report: "Impact on uncertainty"
      scoring:
        method: "checklist"
        pass_threshold: 0.9
    
    - id: "edge_002"
      name: "Small Sample Size"
      category: edge_case
      input:
        data: "Only 15 data points"
        request: "Build predictive model"
      expected:
        must_warn: true
        warning_message: "Insufficient data for reliable modeling"
        must_suggest: "Collect more data or use simpler methods"
      scoring:
        method: "checklist"
        pass_threshold: 1.0
    
    - id: "edge_003"
      name: "Conflicting Data"
      category: edge_case
      input:
        data: "Multiple data sources with conflicting values"
        request: "Analyze sales performance"
      expected:
        must_detect: "Data conflicts"
        must_document: "Conflicts found"
        must_recommend: "Resolution approach"
      scoring:
        method: "checklist"
        pass_threshold: 0.9

    # DOMAIN TESTS
    - id: "domain_001"
      name: "Retail Domain Knowledge"
      category: domain
      input:
        data: "Retail transaction data"
        request: "Analyze sales performance"
      expected:
        must_use_metrics:
          - "Same-store sales growth"
          - "Basket size"
          - "Conversion rate"
          - "Inventory turnover"
        must_consider:
          - "Seasonality"
          - "Promotions"
          - "Channel mix"
      scoring:
        method: "checklist"
        pass_threshold: 0.85
    
    - id: "domain_002"
      name: "Finance Domain Knowledge"
      category: domain
      input:
        data: "Financial statements"
        request: "Analyze financial health"
      expected:
        must_use_metrics:
          - "Current ratio"
          - "Debt-to-equity"
          - "ROE"
          - "Cash flow"
        must_consider:
          - "Industry benchmarks"
          - "Trend analysis"
          - "Risk factors"
      scoring:
        method: "checklist"
        pass_threshold: 0.85

  scoring:
    categories:
      reasoning: 0.30
      output: 0.25
      confidence: 0.20
      consistency: 0.15
      edge_case: 0.05
      domain: 0.05
    
    passing_score: 0.85
    
    reporting:
      format: "detailed"
      include_failures: true
      include_improvement_suggestions: true